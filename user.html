<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroomRoom - Личный кабинет</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .profile-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .profile-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 40px;
        }
        
        .profile-header {
            background: linear-gradient(135deg, #89c1ed 0%, #7eb6df 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .profile-header h3 {
            color: white;
            font-size: 28px;
            margin: 0;
            font-family: 'Caveat', cursive;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }
        
        .profile-body {
            padding: 40px;
        }
        
        .profile-info {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .pet-avatar {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            background: #f0f0f0;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }
        
        .pet-avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }
        
        .pet-avatar img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .avatar-edit-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.65);
            color: white;
            text-align: center;
            font-size: 10px;
            padding: 5px 0;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: 500;
        }
        
        .pet-avatar:hover .avatar-edit-overlay {
            opacity: 1;
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-name {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .pet-name-display {
            font-size: 16px;
            color: #89c1ed;
            font-weight: 500;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .pet-name-display span {
            background: #f0f8ff;
            padding: 4px 12px;
            border-radius: 20px;
        }
        
        .edit-pet-name {
            background: none;
            border: none;
            color: #89c1ed;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        
        .edit-pet-name:hover {
            background: #89c1ed20;
        }
        
        .contact-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        
        .contact-item-small {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .contact-item-small:hover {
            background: #e8e8e8;
        }
        
        .contact-item-small img {
            width: 16px;
            height: 16px;
        }
        
        .contact-item-small input {
            border: none;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            width: auto;
            min-width: 120px;
            padding: 0;
        }
        
        .contact-item-small input:focus {
            outline: none;
            border-bottom: 1px dashed #89c1ed;
        }
        
        .calendar-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 40px;
            overflow: hidden;
        }
        
        .calendar-header {
            background: linear-gradient(135deg, #89c1ed 0%, #7eb6df 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .calendar-header h4 {
            color: white;
            font-size: 24px;
            margin: 0;
            font-family: 'Caveat', cursive;
        }
        
        .calendar-nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .calendar-nav button {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: white;
            transition: all 0.3s;
        }
        
        .calendar-nav button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        
        .current-month {
            font-size: 16px;
            font-weight: 600;
            color: white;
            min-width: 140px;
            text-align: center;
        }
        
        .calendar-legend {
            padding: 12px 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid #f0f0f0;
            background: #fafafa;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .legend-color.red {
            background: #ff6b6b;
        }
        
        .legend-color.green {
            background: #51cf66;
        }
        
        .legend-color.default {
            background: #e9ecef;
            border: 1px solid #dee2e6;
        }
        
        .calendar-grid {
            padding: 20px 30px;
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 15px;
        }
        
        .weekday {
            font-weight: 600;
            color: #89c1ed;
            padding: 8px;
            font-size: 13px;
        }
        
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            background: #f8f9fa;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            position: relative;
            min-height: 70px;
        }
        
        .calendar-day.busy {
            background: #ffe8e8;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .calendar-day.free {
            background: #e8f5e9;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .calendar-day.free:hover {
            transform: scale(1.02);
            background: #c8e6c9;
        }
        
        .calendar-day.default {
            cursor: pointer;
        }
        
        .calendar-day.default:hover {
            background: #e9ecef;
        }
        
        .calendar-day.selected {
            border: 2px solid #89c1ed;
            background: #e3f2fd;
        }
        
        .day-number {
            font-size: 16px;
            font-weight: 600;
        }
        
        .day-status-icon {
            font-size: 12px;
            margin-top: 4px;
        }
        
        .calendar-day.empty {
            background: transparent;
            cursor: default;
            border: 1px dashed #e0e0e0;
        }
        
        .form-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 40px;
            overflow: hidden;
            padding: 0px 0px 30px 0px;
        }
        
        .form-header {
            background: linear-gradient(135deg, #89c1ed 0%, #7eb6df 100%);
            padding: 20px 30px;
        }
        
        .form-header h4 {
            color: white;
            font-size: 24px;
            margin: 0;
            font-family: 'Caveat', cursive;
        }
        
        .form-body {
            padding: 30px;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #333;
        }
        
        select, input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #89c1ed;
        }
        
        textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 80px;
        }
        
        .photo-preview {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 10px;
            background: #f0f0f0;
        }
        
        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .date-warning {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 20px;
            margin-top: 8px;
        }
        
        .date-warning.warning {
            background: #fff3e0;
            color: #e67700;
        }
        
        .date-warning.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .filters-section {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-btn {
            padding: 8px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background: #89c1ed;
            color: white;
            border-color: #89c1ed;
        }
        
        .filter-btn:hover:not(.active) {
            border-color: #89c1ed;
        }
        
        .applications-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;

        }
        
        .applications-header {
            background: linear-gradient(135deg, #89c1ed 0%, #7eb6df 100%);
            padding: 20px 30px;
        }
        
        .applications-header h4 {
            color: white;
            font-size: 24px;
            margin: 0;
            font-family: 'Caveat', cursive;
        }
        
        .applications-list {
            padding: 20px 30px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .application-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .application-card:hover {
            transform: translateX(5px);
            background: #f1f3f5;
        }
        
        .app-info {
            flex: 2;
        }
        
        .app-pet-name {
            font-weight: 700;
            font-size: 18px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .app-pet-photo-mini {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .app-service {
            font-size: 13px;
            color: #89c1ed;
            margin-top: 5px;
        }
        
        .app-date {
            font-size: 12px;
            color: #868e96;
            margin-top: 3px;
        }
        
        .app-message {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }
        
        .status-badge {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .status-new { background: #fe99c5; color: white; }
        .status-processing { background: #89c1ed; color: white; }
        .status-completed { background: #51cf66; color: white; }
        
        .app-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .action-btn.delete:hover {
            background: #ffebee;
            color: #f44336;
        }
        
        .action-btn.view:hover {
            background: #e3f2fd;
            color: #89c1ed;
        }
        
        .action-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #adb5bd;
        }
        
        .photo-modal .modal-content {
            max-width: 500px;
        }
        
        .full-photo {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .profile-container {
                padding: 15px;
            }
            
            .profile-body {
                padding: 20px;
            }
            
            .profile-info {
                flex-direction: column;
                text-align: center;
            }
            
            .contact-info {
                justify-content: center;
            }
            
            .calendar-days {
                gap: 5px;
            }
            
            .calendar-day {
                min-height: 55px;
            }
            
            .day-number {
                font-size: 13px;
            }
            
            .application-card {
                flex-direction: column;
                text-align: center;
            }
            
            .app-pet-name {
                justify-content: center;
            }
            
            .app-actions {
                justify-content: center;
            }
        }
        
        .btn-submit {
            background: #fe99c5;
            border: none;
            padding: 14px 30px;
            border-radius: 40px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-submit:hover {
            background: #ff85b8;
            transform: scale(1.02);
        }
        
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <h3>Личный кабинет</h3>
                <button class="logout-btn test-b-logout" onclick="logout()">Выйти</button>
            </div>
            <div class="profile-body">
                <div class="profile-info">
                    <div class="pet-avatar" onclick="document.getElementById('avatarInput').click()">
                        <img id="petAvatarImg" src="img/user.png" alt="Фото питомца">
                        <div class="avatar-edit-overlay">изменить</div>
                    </div>
                    <input type="file" id="avatarInput" accept="image/png,image/jpeg,image/jpg,image/bmp" style="display: none;">
                    
                    <div class="user-details">
                        <div class="user-name" id="userFullName">Загрузка...</div>
                        <div class="pet-name-display">
                            <span id="petNameDisplay">🐾 Кличка питомца</span>
                            <button class="edit-pet-name" onclick="editPetName()">✏️</button>
                        </div>
                        <div class="contact-info">
                            <div class="contact-item-small">
                                <img src="img/telefon.png" alt="Телефон">
                                <input type="tel" id="userPhone" placeholder="+7 999 999-99-99" onchange="saveUserPhone()">
                            </div>
                            <div class="contact-item-small">
                                <img src="img/pochta.png" alt="Email">
                                <span id="userEmail">загрузка...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="calendar-card">
            <div class="calendar-header">
                <h4>Календарь занятости</h4>
                <div class="calendar-nav">
                    <button onclick="prevMonth()">←</button>
                    <span class="current-month" id="currentMonth"></span>
                    <button onclick="nextMonth()">→</button>
                </div>
            </div>
            <div class="calendar-legend">
                <div class="legend-item">
                    <div class="legend-color red"></div>
                    <span>Занято</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color green"></div>
                    <span>Свободно</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color default"></div>
                    <span>Статус не указан</span>
                </div>
                <div class="legend-item">
                    <span>✨ Нажмите на свободную дату, чтобы выбрать</span>
                </div>
            </div>
            <div class="calendar-grid">
                <div class="weekdays">
                    <div class="weekday">Пн</div>
                    <div class="weekday">Вт</div>
                    <div class="weekday">Ср</div>
                    <div class="weekday">Чт</div>
                    <div class="weekday">Пт</div>
                    <div class="weekday">Сб</div>
                    <div class="weekday">Вс</div>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>
        </div>

        <div class="form-card">
            <div class="form-header">
                <h4>Новая заявка</h4>
            </div>
            <div class="form-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>Кличка питомца *</label>
                        <input type="text" class="test-i-name" id="petName" placeholder="Введите кличку">
                        <div id="petNameError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label>Услуга *</label>
                        <select id="serviceSelect">
                            <option value="">Выберите услугу</option>
                            <option value="Гигиена">🛁 Гигиена</option>
                            <option value="Тримминг">✂️ Тримминг</option>
                            <option value="Стрижка">🐕 Стрижка</option>
                            <option value="Экспресс-линька">🍃 Экспресс-линька</option>
                        </select>
                        <div id="serviceError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label>Желаемая дата *</label>
                        <input type="date" id="appointmentDate" onchange="checkDateAvailability()">
                        <div id="dateWarning" class="date-warning"></div>
                        <div id="dateError" class="error-message"></div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>📸 Фото питомца *</label>
                        <input type="file" id="petPhoto" class="test-c-photo" accept="image/png,image/jpeg,image/jpg,image/bmp">
                        <div class="photo-preview" id="photoPreview" style="display: none;">
                            <img id="previewImg" src="">
                        </div>
                        <div id="photoError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label>Дополнительные пожелания</label>
                        <textarea id="additionalMessage" placeholder="Особенности питомца, пожелания по стрижке..."></textarea>
                    </div>
                </div>
                <button class="btn-submit test-b-new" onclick="handleCreateApplication()">Создать заявку</button>
            </div>
        </div>

        <div class="applications-card">
            <div class="applications-header">
                <h4>Мои заявки</h4>
            </div>
            <div class="form-body" style="padding: 20px 30px 0 30px;">
                <div class="filters-section">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Все</button>
                    <button class="filter-btn" data-filter="Новая" onclick="setFilter('Новая')">Новые</button>
                    <button class="filter-btn" data-filter="Обработка данных" onclick="setFilter('Обработка данных')">Обработка данных</button>
                    <button class="filter-btn" data-filter="Услуга оказана" onclick="setFilter('Услуга оказана')">Завершённые</button>
                </div>
            </div>
            <div class="applications-list" id="applications-list"></div>
        </div>
    </div>

    <div id="photoModal" class="modal photo-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="photoModalTitle">Фото</h3>
                <button class="modal-close" onclick="closeModal('photoModal')">&times;</button>
            </div>
            <div class="modal-body">
                <img id="modalPhotoImg" class="full-photo" src="" alt="Фото">
                <p id="modalPhotoCaption" style="text-align: center; color: #666;"></p>
            </div>
        </div>
    </div>

    <div id="appDetailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Детали заявки</h3>
                <button class="modal-close" onclick="closeModal('appDetailsModal')">&times;</button>
            </div>
            <div class="modal-body" id="appDetailsBody">
            </div>
        </div>
    </div>
    <button class="chat-button" id="globalChatBtn" onclick="openGlobalChat()" style="display: none;">
        💬
        <span id="unreadBadge" class="unread-badge" style="display: none;">0</span>
    </button>

    <script src="js/auth.js"></script>
    <script src="js/applications.js"></script>
    <script src="js/security.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/reviews.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script>
        (async () => {
            await initData();
            const CALENDAR_KEY = 'groomroom_calendar_status';
            let currentYear = new Date().getFullYear();
            let currentMonth = new Date().getMonth();
            let selectedDate = null;
            let currentFilter = 'all';
            
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            if (user.role === 'admin') {
                window.location.href = 'admin.html';
                return;
            }
            function getCalendarStatus() {
                const saved = localStorage.getItem(CALENDAR_KEY);
                return saved ? JSON.parse(saved) : {};
            }
            
            function isDateBusy(dateStr) {
                const statuses = getCalendarStatus();
                return statuses[dateStr] === 'red';
            }
            
            function isDateFree(dateStr) {
                const statuses = getCalendarStatus();
                return statuses[dateStr] === 'green';
            }
            
            function renderCalendar() {
                const firstDayOfMonth = new Date(currentYear, currentMonth, 1);
                const startWeekday = firstDayOfMonth.getDay();
                const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
                const statuses = getCalendarStatus();
                
                let startOffset = startWeekday === 0 ? 6 : startWeekday - 1;
                
                const calendarDays = document.getElementById('calendarDays');
                const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
                document.getElementById('currentMonth').innerHTML = `${monthNames[currentMonth]} ${currentYear}`;
                
                calendarDays.innerHTML = '';
                
                for (let i = 0; i < startOffset; i++) {
                    const emptyDay = document.createElement('div');
                    emptyDay.className = 'calendar-day empty';
                    calendarDays.appendChild(emptyDay);
                }
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const isBusy = isDateBusy(dateStr);
                    const isFree = isDateFree(dateStr);
                    
                    const dayElement = document.createElement('div');
                    
                    if (isBusy) {
                        dayElement.className = 'calendar-day busy';
                    } else if (isFree) {
                        dayElement.className = 'calendar-day free';
                    } else {
                        dayElement.className = 'calendar-day default';
                    }
                    
                    if (!isBusy) {
                        dayElement.onclick = () => selectCalendarDate(dateStr, day);
                    } else {
                        dayElement.onclick = () => showToast('Эта дата занята, выберите другую', 'error');
                    }
                    
                    if (selectedDate === dateStr) {
                        dayElement.classList.add('selected');
                    }
                    
                    const dayNumber = document.createElement('div');
                    dayNumber.className = 'day-number';
                    dayNumber.textContent = day;
                    
                    const statusIcon = document.createElement('div');
                    statusIcon.className = 'day-status-icon';
                    if (isBusy) {
                        statusIcon.textContent = '🔴';
                    } else if (isFree) {
                        statusIcon.textContent = '🟢';
                    } else {
                        statusIcon.textContent = '❓';
                    }
                    
                    dayElement.appendChild(dayNumber);
                    dayElement.appendChild(statusIcon);
                    calendarDays.appendChild(dayElement);
                }
            }
            
            function selectCalendarDate(dateStr, day) {
                selectedDate = dateStr;
                document.getElementById('appointmentDate').value = dateStr;
                checkDateAvailability();
                renderCalendar();
                showToast(`Выбрана дата: ${day}.${currentMonth+1}.${currentYear}`, 'success');
            }
            
            function prevMonth() {
                if (currentMonth === 0) {
                    currentMonth = 11;
                    currentYear--;
                } else {
                    currentMonth--;
                }
                selectedDate = null;
                renderCalendar();
            }
            
            function nextMonth() {
                if (currentMonth === 11) {
                    currentMonth = 0;
                    currentYear++;
                } else {
                    currentMonth++;
                }
                selectedDate = null;
                renderCalendar();
            }
            
            function checkDateAvailability() {
                const date = document.getElementById('appointmentDate').value;
                const warningDiv = document.getElementById('dateWarning');
                
                if (!date) {
                    warningDiv.innerHTML = '';
                    return;
                }
                
                if (isDateBusy(date)) {
                    warningDiv.innerHTML = 'Эта дата занята! Выберите другую дату.';
                    warningDiv.className = 'date-warning warning';
                } else if (isDateFree(date)) {
                    warningDiv.innerHTML = 'Эта дата свободна!';
                    warningDiv.className = 'date-warning success';
                } else {
                    warningDiv.innerHTML = 'Статус даты не указан. Вы можете записаться.';
                    warningDiv.className = 'date-warning';
                }
            }
            
            function loadUserData() {
                document.getElementById('userFullName').textContent = user.fio || 'Пользователь';
                document.getElementById('userEmail').textContent = user.email || 'email@example.com';
                
                const savedPetPhoto = localStorage.getItem(`pet_avatar_${user.id}`);
                if (savedPetPhoto && savedPetPhoto !== 'null') {
                    document.getElementById('petAvatarImg').src = savedPetPhoto;
                }
                
                const savedPetName = localStorage.getItem(`pet_name_${user.id}`);
                if (savedPetName && savedPetName !== 'null') {
                    document.getElementById('petNameDisplay').innerHTML = `🐾 ${savedPetName}`;
                    document.getElementById('petName').value = savedPetName;
                }
                
                const savedPhone = localStorage.getItem(`user_phone_${user.id}`);
                if (savedPhone && savedPhone !== 'null') {
                    document.getElementById('userPhone').value = savedPhone;
                }
            }
            
            function editPetName() {
                const currentName = document.getElementById('petName').value || '';
                const newName = prompt('Введите кличку питомца:', currentName);
                if (newName && newName.trim()) {
                    const trimmedName = newName.trim();
                    document.getElementById('petNameDisplay').innerHTML = `🐾 ${trimmedName}`;
                    document.getElementById('petName').value = trimmedName;
                    localStorage.setItem(`pet_name_${user.id}`, trimmedName);
                    showToast('Кличка сохранена!', 'success');
                }
            }
            
            function saveUserPhone() {
                const phone = document.getElementById('userPhone').value;
                if (phone && phone.trim()) {
                    localStorage.setItem(`user_phone_${user.id}`, phone.trim());
                    showToast('Телефон сохранен!', 'success');
                }
            }
            
            document.getElementById('avatarInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                if (!file.type.match('image/png') && !file.type.match('image/jpeg') && !file.type.match('image/jpg') && !file.type.match('image/bmp')) {
                    showToast('Формат: PNG, JPEG, BMP', 'error');
                    return;
                }
                
                if (file.size > 2 * 1024 * 1024) {
                    showToast('Фото не более 2 МБ', 'error');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('petAvatarImg').src = ev.target.result;
                    localStorage.setItem(`pet_avatar_${user.id}`, ev.target.result);
                    showToast('Фото питомца обновлено!', 'success');
                };
                reader.readAsDataURL(file);
            });
            
            document.getElementById('petPhoto').addEventListener('change', function(e) {
                const file = e.target.files[0];
                const preview = document.getElementById('photoPreview');
                const previewImg = document.getElementById('previewImg');
                
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        previewImg.src = ev.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                } else {
                    preview.style.display = 'none';
                    previewImg.src = '';
                }
            });
            
            function setFilter(filter) {
                currentFilter = filter;
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    if (btn.dataset.filter === filter) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
                loadApplications();
            }
            
            function loadApplications() {
                let applications = getUserApplications(user.id);
                
                if (currentFilter !== 'all') {
                    applications = applications.filter(app => app.status === currentFilter);
                }
                
                const container = document.getElementById('applications-list');
                
                if (applications.length === 0) {
                    container.innerHTML = '<div class="empty-state">🐾 У вас пока нет заявок<br>Создайте первую!</div>';
                    return;
                }
                
                container.innerHTML = applications.map(app => `
                    <div class="application-card" data-id="${app.id}" onclick="showAppDetails(${app.id})">
                        <div class="app-info">
                            <div class="app-pet-name">
                                ${app.petPhoto ? `<img src="${app.petPhoto}" class="app-pet-photo-mini" alt="Фото">` : '<div class="app-pet-photo-mini" style="background:#e0e0e0; display:flex; align-items:center; justify-content:center;">🐕</div>'}
                                ${escapeHtml(app.petName)}
                            </div>
                            <div class="app-service">${escapeHtml(app.service || 'Услуга не указана')}</div>
                            <div class="app-date">📅 ${formatDateFull(app.appointmentDate || app.createdAt)}</div>
                            ${app.additionalMessage ? `<div class="app-message">💬 ${escapeHtml(app.additionalMessage.substring(0, 60))}${app.additionalMessage.length > 60 ? '...' : ''}</div>` : ''}
                        </div>
                        <span class="status-badge ${getStatusClass(app.status)} test-t-status">${app.status}</span>
                        <div class="app-actions" onclick="event.stopPropagation()">
                            ${app.resultPhoto ? `<button class="action-btn view" onclick="showPhoto('${app.resultPhoto}', 'Фото результата - ${escapeHtml(app.petName)}')">📷</button>` : ''}
                            ${app.petPhoto ? `<button class="action-btn view" onclick="showPhoto('${app.petPhoto}', 'Фото питомца - ${escapeHtml(app.petName)}')">🐶</button>` : ''}
                            ${app.status === 'Новая' ? 
                                `<button class="action-btn delete test-b-remove" onclick="handleDeleteApplication(${app.id})" title="Отменить запись">🗑️</button>` : 
                                `<button class="action-btn delete disabled" disabled style="opacity:0.3;">🔒</button>`
                            }
                        </div>
                    </div>
                `).join('');
            }
            
            function formatDateFull(dateStr) {
                const date = new Date(dateStr);
                return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            }
            
            function showPhoto(photoSrc, title) {
                document.getElementById('photoModalTitle').textContent = title;
                document.getElementById('modalPhotoImg').src = photoSrc;
                document.getElementById('modalPhotoCaption').textContent = title;
                openModal('photoModal');
            }
            
            function showAppDetails(appId) {
                const applications = getUserApplications(user.id);
                const app = applications.find(a => a.id === appId);
                if (!app) return;
        
                const modalBody = document.getElementById('appDetailsBody');
                modalBody.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <strong>🐾 Кличка:</strong> ${escapeHtml(app.petName)}<br>
                        <strong>✂️ Услуга:</strong> ${escapeHtml(app.service || 'Не указана')}<br>
                        <strong>📅 Дата:</strong> ${formatDateFull(app.appointmentDate || app.createdAt)}<br>
                        <strong>📊 Статус:</strong> <span class="status-badge ${getStatusClass(app.status)}" style="display: inline-block; margin-top: 5px;">${app.status}</span><br>
                        ${app.additionalMessage ? `<strong>💬 Сообщение:</strong><br><p style="background:#f5f5f5; padding: 10px; border-radius: 16px; margin-top: 5px;">${escapeHtml(app.additionalMessage)}</p>` : ''}
                        ${app.resultPhoto ? `<strong>📸 Фото результата:</strong><br><img src="${app.resultPhoto}" style="max-width: 100%; border-radius: 16px; margin-top: 10px; cursor: pointer;" onclick="showPhoto('${app.resultPhoto}', 'Фото результата - ${escapeHtml(app.petName)}')">` : ''}
                    </div>
                `;
        
                if (app.status === 'Услуга оказана' && !hasReview(app.id)) {
                    const reviewBtn = document.createElement('div');
                    reviewBtn.className = 'review-buttons';
                    reviewBtn.style.marginTop = '20px';
                    reviewBtn.innerHTML = `<button class="btn-small" onclick="showReviewForm(${app.id}, '${escapeHtml(app.petName)}')">⭐ Оставить отзыв</button>`;
                    modalBody.appendChild(reviewBtn);
                }
        
                openModal('appDetailsModal');
            }

            function hasReview(applicationId) {
                const reviews = JSON.parse(localStorage.getItem(REVIEWS_KEY) || '[]');
                return reviews.some(r => r.applicationId === applicationId);
            }

            function showReviewForm(applicationId, petName) {
                const modalBody = document.getElementById('appDetailsBody');
                modalBody.innerHTML = `
                    <div class="review-form">
                        <h4>Оцените услугу для ${escapeHtml(petName)}</h4>
                        <div class="rating-input">
                            <span>Ваша оценка:</span>
                            <div class="stars-input" id="starsInput">
                                ${[1,2,3,4,5].map(s => `<span class="star" data-rating="${s}" onclick="selectRating(${s})">☆</span>`).join('')}
                            </div>
                        </div>
                        <textarea id="reviewText" placeholder="Расскажите о впечатлениях..." rows="4"></textarea>
                        <input type="file" id="reviewPhoto" accept="image/*">
                        <div class="review-buttons">
                            <button class="btn" onclick="submitReview(${applicationId})">Отправить отзыв</button>
                            <button class="btn-small" onclick="closeModal('appDetailsModal')">Отмена</button>
                        </div>
                    </div>
                `;
                openModal('appDetailsModal');
            }

            let selectedRating = 0;
            function selectRating(rating) {
                selectedRating = rating;
                document.querySelectorAll('.star').forEach((star, i) => {
                    star.textContent = i < rating ? '★' : '☆';
                });
            }

            async function submitReview(applicationId) {
                if (selectedRating === 0) {
                    showToast('Выберите оценку', 'error');
                    return;
                }
        
                const text = document.getElementById('reviewText').value;
                if (!text.trim()) {
                    showToast('Напишите отзыв', 'error');
                    return;
                }
        
                let photo = null;
                const photoFile = document.getElementById('reviewPhoto').files[0];
                if (photoFile) {
                    photo = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = e => resolve(e.target.result);
                        reader.readAsDataURL(photoFile);
                    });
                }
        
                addReview(applicationId, user.id, selectedRating, text, photo);
                closeModal('appDetailsModal');
                loadApplications();
            }
            
            async function handleCreateApplication() {
                const petName = document.getElementById('petName').value;
                const service = document.getElementById('serviceSelect').value;
                const appointmentDate = document.getElementById('appointmentDate').value;
                const additionalMessage = document.getElementById('additionalMessage').value;
                const photoFile = document.getElementById('petPhoto').files[0];
                
                document.getElementById('petNameError').innerHTML = '';
                document.getElementById('serviceError').innerHTML = '';
                document.getElementById('dateError').innerHTML = '';
                document.getElementById('photoError').innerHTML = '';
                
                let hasError = false;
                
                if (!petName) {
                    document.getElementById('petNameError').innerHTML = 'Введите кличку питомца';
                    hasError = true;
                }
                
                if (!service) {
                    document.getElementById('serviceError').innerHTML = 'Выберите услугу';
                    hasError = true;
                }
                
                if (!appointmentDate) {
                    document.getElementById('dateError').innerHTML = 'Выберите дату';
                    hasError = true;
                } else {
                    const selectedDateObj = new Date(appointmentDate);
                    const todayDate = new Date();
                    todayDate.setHours(0, 0, 0, 0);
                    if (selectedDateObj < todayDate) {
                        document.getElementById('dateError').innerHTML = 'Дата не может быть в прошлом';
                        hasError = true;
                    }
                    if (isDateBusy(appointmentDate)) {
                        document.getElementById('dateError').innerHTML = 'Эта дата занята! Выберите другую';
                        hasError = true;
                    }
                }
                
                if (!photoFile) {
                    document.getElementById('photoError').innerHTML = 'Загрузите фото питомца';
                    hasError = true;
                } else if (!photoFile.type.match('image/png') && !photoFile.type.match('image/jpeg') && !photoFile.type.match('image/jpg') && !photoFile.type.match('image/bmp')) {
                    document.getElementById('photoError').innerHTML = 'Формат: PNG, JPEG, BMP';
                    hasError = true;
                } else if (photoFile.size > 2 * 1024 * 1024) {
                    document.getElementById('photoError').innerHTML = 'Фото не более 2 МБ';
                    hasError = true;
                }
                
                if (hasError) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const result = createApplicationFull(petName, e.target.result, user.id, service, appointmentDate, additionalMessage);
                    
                    if (result.success) {
                        showToast('Заявка успешно создана!', 'success');
                        document.getElementById('petPhoto').value = '';
                        document.getElementById('photoPreview').style.display = 'none';
                        document.getElementById('appointmentDate').value = '';
                        document.getElementById('additionalMessage').value = '';
                        document.getElementById('serviceSelect').value = '';
                        selectedDate = null;
                        renderCalendar();
                        loadApplications();
                    } else {
                        if (result.errors.name) document.getElementById('petNameError').innerHTML = result.errors.name;
                        if (result.errors.photo) document.getElementById('photoError').innerHTML = result.errors.photo;
                    }
                };
                reader.readAsDataURL(photoFile);
            }
            
            
            function handleDeleteApplication(appId) {
                if (confirm('Вы уверены, что хотите отменить запись?')) {
                    const result = deleteApplication(appId, user.id);
                    if (result.success) {
                        showToast('Заявка удалена', 'success');
                        loadApplications();
                    } else {
                        showToast('❌ ' + result.error, 'error');
                    }
                }
            }
            
            loadUserData();
            renderCalendar();
            loadApplications();
            setupModalClose();
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal('photoModal');
                    closeModal('appDetailsModal');
                    document.querySelectorAll('.modal.active').forEach(modal => {
                        closeModal(modal.id);
                    });
                }
            });
            let currentChatAppId = null;

            function openGlobalChat() {
                const apps = getUserApplications(user.id);
                const activeApp = apps.find(a => a.status !== 'Услуга оказана');
        
                if (activeApp) {
                    openChatForApplication(activeApp.id, activeApp.petName);
                } else if (apps.length > 0) {
                    openChatForApplication(apps[0].id, apps[0].petName);
                } else {
                    showToast('У вас нет активных заявок для чата', 'info');
                }
            }

            function openChatForApplication(appId, petName) {
                const existingChat = document.getElementById(`chat-container-${appId}`);
                if (existingChat) {
                    existingChat.remove();
                    return;
                }
        
                document.querySelectorAll('.chat-container').forEach(el => el.remove());
        
                const chatHtml = renderChatModal(appId, petName, user.id, user.fio.split(' ')[0], false);
                document.body.insertAdjacentHTML('beforeend', chatHtml);
                currentChatAppId = appId;
        
                markMessagesAsRead(appId, user.id);
                updateUnreadCount();
            }

            function updateUnreadCount() {
                const count = getUnreadCount(user.id);
                const badge = document.getElementById('unreadBadge');
                const btn = document.getElementById('globalChatBtn');
        
                if (count > 0) {
                    badge.textContent = count > 9 ? '9+' : count;
                    badge.style.display = 'inline-block';
                    btn.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            }

            setInterval(() => {
                if (currentChatAppId) {
                    refreshChatMessages(currentChatAppId, user.id, user.fio.split(' ')[0], false);
                }
                updateUnreadCount();
            }, 5000);

            setTimeout(() => {
                const apps = getUserApplications(user.id);
                if (apps.length > 0) {
                    document.getElementById('globalChatBtn').style.display = 'flex';
                }
            }, 1000);
        })();
    </script>
</body>
</html>
